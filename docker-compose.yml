version: "3.9"

services:
  router:
    build: .
    command: npx tsx src/router/index.ts
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - ROUTER_URL=http://router:3000
    depends_on:
      - web_research
      - doc_analysis
      - code_review
      - synthesis

  web_research:
    build: .
    command: npx tsx src/agents/web-research.ts
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - ROUTER_URL=http://router:3000

  doc_analysis:
    build: .
    command: npx tsx src/agents/doc-analysis.ts
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - ROUTER_URL=http://router:3000

  code_review:
    build: .
    command: npx tsx src/agents/code-review.ts
    ports:
      - "3003:3003"
    env_file:
      - .env
    environment:
      - ROUTER_URL=http://router:3000

  synthesis:
    build: .
    command: npx tsx src/agents/synthesis.ts
    ports:
      - "3004:3004"
    env_file:
      - .env
    environment:
      - ROUTER_URL=http://router:3000
