name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ci-dummy-key
      CIRCLE_API_KEY: ci-dummy-key
      ROUTER_WALLET: arc:0xci_dummy_wallet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint (syntax check)
        run: python -m compileall -q router agents shared tests
      - name: Type check (import smoke test)
        run: PYTHONPATH=. python -c "import router.main, agents.base, shared.models, shared.config"
      - name: Run tests
        run: PYTHONPATH=. python -m pytest tests/ -v

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
